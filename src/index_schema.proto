syntax = "proto3";

package valkey_search.data_model;

enum AttributeDataType {
  ATTRIBUTE_DATA_TYPE_UNSPECIFIED = 0;
  ATTRIBUTE_DATA_TYPE_HASH = 1;
  ATTRIBUTE_DATA_TYPE_JSON = 2;
}

enum Language {
  LANGUAGE_UNSPECIFIED = 0;
  LANGUAGE_ENGLISH = 1;
}

message IndexSchema {
  message Stats {
    // Total number of hash keys indexed
    uint32 documents_count = 1;
    // Sum of vectors indexed in all the indexes for the IndexSchema
    uint32 records_count = 2 [deprecated = true];
  }

  string name = 1;
  repeated string subscribed_key_prefixes = 2;
  AttributeDataType attribute_data_type = 3;
  Language language = 4;
  float score = 5;
  repeated Attribute attributes = 6;
  Stats stats = 7;
  optional uint32 db_num = 8;

  // TODO: make these optional so that we can give them default values if loading an old version RDB
  string punctuation = 9;
  bool with_offsets = 10;
  repeated string stop_words = 11;
  uint32 min_stem_size = 12;
  bool skip_initial_scan = 13;
}


message TextIndex {
  bool with_suffix_trie = 1;
  bool no_stem = 2;
  double weight = 3;
}


enum AttributeIndexType {
  ATTRIBUTE_INDEX_TYPE_UNSPECIFIED = 0;
  ATTRIBUTE_INDEX_TYPE_VECTOR = 1;
}

message Attribute {
  string alias = 1;
  string identifier = 2;
  Index index = 3;
}

message Index {
  oneof index_type {
    VectorIndex vector_index = 1;
    NumericIndex numeric_index = 2;
    TagIndex tag_index = 3;
    TextIndex text_index = 4;
  }
}

message NumericIndex {}

message TagIndex {
  string separator = 1;
  bool case_sensitive = 2;
}

message TrackedKeyMetadata {
  string key = 1;
  uint64 internal_id = 2;
  float magnitude = 3;
}

message VectorIndex {
  uint32 dimension_count = 1;
  bool normalize = 2;
  DistanceMetric distance_metric = 3;
  VectorDataType vector_data_type = 4;
  uint32 initial_cap = 5;
  oneof algorithm {
    HNSWAlgorithm hnsw_algorithm = 6;
    FlatAlgorithm flat_algorithm = 7;
    SVSVamanaAlgorithm svs_vamana_algorithm = 8;
  }
}

enum DistanceMetric {
  DISTANCE_METRIC_UNSPECIFIED = 0;
  DISTANCE_METRIC_L2 = 1;
  DISTANCE_METRIC_IP = 2;
  DISTANCE_METRIC_COSINE = 3;
}

enum VectorDataType {
  VECTOR_DATA_TYPE_UNSPECIFIED = 0;
  VECTOR_DATA_TYPE_FLOAT32 = 1;
}

enum SVSCompressionType {
  SVS_COMPRESSION_NONE = 0;
  SVS_COMPRESSION_FP16 = 1;
  SVS_COMPRESSION_LVQ4 = 2;
  SVS_COMPRESSION_LVQ8 = 3;
  SVS_COMPRESSION_LVQ4X4 = 4;
  SVS_COMPRESSION_LVQ4X8 = 5;
  SVS_COMPRESSION_LEANVEC4X4 = 6;
  SVS_COMPRESSION_LEANVEC4X8 = 7;
  SVS_COMPRESSION_LEANVEC8X8 = 8;
  SVS_COMPRESSION_SQ8 = 9;
}

enum RawVectorStorage {
  RAW_VECTOR_STORAGE_KEEP = 0;
  RAW_VECTOR_STORAGE_DROP = 1;
}

message HNSWAlgorithm {
  uint32 m = 1;
  uint32 ef_construction = 2;
  uint32 ef_runtime = 3;
}

message FlatAlgorithm {
  uint32 block_size = 1;
}

message SVSVamanaAlgorithm {
  uint32 graph_max_degree = 1;
  uint32 construction_window_size = 2;
  uint32 search_window_size = 3;
  float alpha = 4;
  SVSCompressionType compression = 5;
  // Required when compression is one of the LEANVEC* variants. Number of
  // dimensions the LeanVec projection reduces to; must be < dim.
  uint32 leanvec_dims = 6;
  // Number of vectors to accumulate before training the LeanVec matrices
  // and building the index. Only used for LEANVEC* compression.
  uint32 leanvec_training_threshold = 7;
  // KEEP (default): retain intern store for exact vector retrieval.
  // DROP: skip intern store, use SVS native reconstruct/get_distance APIs.
  RawVectorStorage raw_vector_storage = 8;
}

